<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Health Agent — Traxión</title>
<style>
  /* ── (Paleta de colores) ───────────────────────── */
  :root {
    --bg:        #2d343f;
    --surface:   #161920;
    --surface2:  #1e2229;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.13);
    --text:      #e8eaed;
    --muted:     #7a8390;
    --accent:    #00c2a8;
    --accent2:   #0099ff;
    --red:       #ff4d4d;
    --amber:     #f59e0b;
    --green:     #22c55e;
    --red-bg:    rgba(255,77,77,0.08);
    --amber-bg:  rgba(245,158,11,0.08);
    --green-bg:  rgba(34,197,94,0.08);
    --mono:      'Courier New', Courier, monospace;
    --sans:      'Segoe UI', system-ui, sans-serif;
  }

  /* ── RESET ────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── LAYOUT ───────────────────────────────────────────── */
  .shell {
    display: grid;
    grid-template-columns: 300px 1fr;
    grid-template-rows: 56px 1fr;
    min-height: 100vh;
  }

  /* ── TOPBAR ───────────────────────────────────────────── */
  .topbar {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
  }
  .topbar-logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .topbar-sep { color: var(--border2); }
  .topbar-name { font-size: 13px; color: var(--muted); }
  .topbar-badge {
    margin-left: auto;
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 99px;
    background: rgba(0,194,168,0.12);
    color: var(--accent);
    border: 1px solid rgba(0,194,168,0.2);
    font-family: var(--mono);
  }

  /* ── SIDEBAR ──────────────────────────────────────────── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
  }
  .sidebar-label {
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 0 4px;
    font-family: var(--mono);
  }
  .client-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    text-align: left;
    transition: all .15s;
    color: var(--text);
    font-family: var(--sans);
  }
  .client-btn:hover { background: var(--surface2); border-color: var(--border2); }
  .client-btn.active {
    background: rgba(0,194,168,0.08);
    border-color: rgba(0,194,168,0.3);
  }
  .client-btn-name {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .client-btn-meta {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .risk-pill {
    display: inline-block;
    font-size: 10px;
    font-family: var(--mono);
    padding: 1px 6px;
    border-radius: 4px;
    margin-top: 4px;
  }
  .pill-alto   { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(255,77,77,0.2); }
  .pill-medio  { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
  .pill-bajo   { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .pill-null   { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  /* ── MAIN ─────────────────────────────────────────────── */
  .main {
    padding: 28px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── EMPTY STATE ──────────────────────────────────────── */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    text-align: center;
  }
  .empty-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  /* ── CARD ─────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: var(--mono);
  }
  .card-body { padding: 18px; }

  /* ── CLIENT HEADER ────────────────────────────────────── */
  .client-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .client-name { font-size: 20px; font-weight: 600; line-height: 1.2; }
  .client-meta-row {
    display: flex;
    gap: 16px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .meta-chip {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    display: flex;
    gap: 5px;
  }
  .meta-chip span { color: var(--text); }

  /* ── ANALYZE BTN ──────────────────────────────────────── */
  .analyze-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .analyze-btn:hover { opacity: .9; }
  .analyze-btn.loading { background: var(--surface2); color: var(--muted); cursor: not-allowed;}

  /* ── METRICS GRID ─────────────────────────────────────── */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
  }
  .metric-card {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 14px;
    border: 1px solid var(--border);
  }
  .metric-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: var(--mono);
    margin-bottom: 6px;
  }
  .metric-value {
    font-size: 22px;
    font-weight: 600;
    font-family: var(--mono);
  }
  .metric-trend {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-family: var(--mono);
  }
  .trend-down { color: var(--red); }
  .trend-up   { color: var(--green); }

  /* ── SEMAFORO Y DIAGNOSTICO ───────────────────────────── */
  .semaforo {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 18px;
  }
  .semaforo-info { flex: 1; }
  .semaforo-level {
    font-size: 28px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .level-alto  { color: var(--red); }
  .level-medio { color: var(--amber); }
  .level-bajo  { color: var(--green); }
  
  .semaforo-resumen {
    flex: 2;
    font-size: 14px;
    border-left: 2px solid var(--border2);
    padding-left: 20px;
  }

  /* ── LOADER ───────────────────────────────────────────── */
  .loader-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px;
    gap: 14px;
  }
  .loader {
    width: 28px; height: 28px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── EVIDENCIA Y ACCIONES ─────────────────────────────── */
  .evidencia-item, .accion-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    border-left: 3px solid var(--accent);
  }
  .badge {
    background: var(--border);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent);
    margin-right: 8px;
  }
  .advertencia {
    background: rgba(245,158,11,0.1);
    color: var(--amber);
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 10px;
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="shell">
  <header class="topbar">
    <span class="topbar-logo">Traxión</span>
    <span class="topbar-sep">·</span>
    <span class="topbar-name">Customer Health Agent (Demo)</span>
    <span class="topbar-badge">Modelo IA Activado</span>
  </header>

  <aside class="sidebar">
    <div class="sidebar-label">Cartera de clientes simulada</div>
    <div id="client-list"></div>
  </aside>

  <main class="main" id="main">
    <div class="empty">
      <div class="empty-icon">&#9670;</div>
      <h3>Selecciona un cliente</h3>
      <p>Elige un perfil de la barra lateral para ver sus métricas e iniciar el diagnóstico simulado.</p>
    </div>
  </main>
</div>

<script>
/* DATOS DEL ENTRADA (Inputs) */
const CLIENTES = [
  { nombre:"Grupo Industrial Norteño S.A.", segmento:"industrial", antiguedad:38, puntualidad:91.4, nps:22, cancelaciones:"4.4%", quejas: 2, contrato: 95 },
  { nombre:"Corporativo Financiero Centro", segmento:"corporativo", antiguedad:61, puntualidad:97.1, nps:41, cancelaciones:"0.5%", quejas: 3, contrato: 280 },
  { nombre:"Desarrolladora Tres Valles", segmento:"corporativo", antiguedad:44, puntualidad:96.3, nps:31, cancelaciones:"7.0%", quejas: 0, contrato: 61 }
];

/* DATOS DE SALIDA (Outputs pre-generados por ustedes) */
const DIAGNOSTICOS = [
  {
    nivel_riesgo: "alto", score: 88, confianza: "alta",
    resumen: "Cliente industrial con todos los factores de riesgo activos simultáneamente. La ventana de intervención efectiva es de máximo 2 semanas.",
    evidencia: [
      { metrica: "contrato_y_licitacion", observacion: "Contrato vence en 95 días con licitación activa abierta.", peso: "crítico" },
      { metrica: "nps", observacion: "Caída de 48 a 22 en 90 días. Tendencia negativa sostenida.", peso: "alto" }
    ],
    acciones: [
      { prioridad: 1, responsable: "Laura Mendoza (AM)", accion: "Llamar hoy al nuevo coordinador de flota para agendar visita.", playbook: "cambio_interlocutor_alto_riesgo" },
      { prioridad: 2, responsable: "Operaciones", accion: "Enviar reporte de desempeño con plan de mejora de puntualidad.", playbook: "recuperacion_confianza_operativa" }
    ]
  },
  {
    nivel_riesgo: "medio", score: 54, confianza: "alta",
    resumen: "Cliente sano operativamente pero con una bomba de tiempo relacional. Quejas acumuladas en ruta VIP.",
    evidencia: [
      { metrica: "quejas", observacion: "3 quejas abiertas del mismo conductor. Una escalada a RR.HH.", peso: "alto" }
    ],
    acciones: [
      { prioridad: 1, responsable: "Gerente Operaciones", accion: "Reasignar el conductor de la ruta VIP.", playbook: "resolucion_queja_ruta_vip" }
    ]
  },
  {
    nivel_riesgo: "alto", score: 81, confianza: "alta",
    resumen: "Este es el churn más peligroso: el silencioso. El cliente no se queja porque ya decidió no renovar.",
    advertencia_confianza: "Silencio total del cliente en los últimos 2 meses.",
    evidencia: [
      { metrica: "contrato", observacion: "Vence en 61 días sin comunicación.", peso: "crítico" },
      { metrica: "tasa_cancelacion", observacion: "Subió de 4% a 7% sin causa operativa.", peso: "alto" }
    ],
    acciones: [
      { prioridad: 1, responsable: "Dirección Comercial", accion: "Llamada directa de nivel directivo para rescatar contrato.", playbook: "rescate_ejecutivo_contrato_critico" }
    ]
  }
];

let currentIndex = 0;

function buildSidebar() {
  const list = document.getElementById('client-list');
  list.innerHTML = CLIENTES.map((c,i) => `
    <button class="client-btn" onclick="selectClient(${i})">
      <div class="client-btn-name">${c.nombre}</div>
      <div class="client-btn-meta">${c.segmento} · ${c.antiguedad} meses</div>
    </button>
  `).join('');
}

function selectClient(i) {
  currentIndex = i;
  const c = CLIENTES[i];
  
  document.getElementById('main').innerHTML = `
    <div class="card">
      <div class="card-body">
        <div class="client-header">
          <div>
            <div class="client-name">${c.nombre}</div>
            <div class="client-meta-row">
              <div class="meta-chip">segmento: <span>${c.segmento}</span></div>
            </div>
          </div>
          <button class="analyze-btn" id="analyze-btn" onclick="runSimulatedAnalysis()">Analizar con IA &#9670;</button>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top: 15px;">
      <div class="card-header"><div class="card-title">Métricas Operativas</div></div>
      <div class="card-body metrics-grid">
        <div class="metric-card"><div class="metric-label">Puntualidad</div><div class="metric-value">${c.puntualidad}%</div></div>
        <div class="metric-card"><div class="metric-label">NPS</div><div class="metric-value">${c.nps}</div></div>
        <div class="metric-card"><div class="metric-label">Quejas</div><div class="metric-value">${c.quejas}</div></div>
        <div class="metric-card"><div class="metric-label">Contrato (Días)</div><div class="metric-value">${c.contrato}</div></div>
      </div>
    </div>
    
    <div id="diagnosis-area" style="margin-top: 15px;"></div>
  `;
}

function runSimulatedAnalysis() {
  const btn = document.getElementById('analyze-btn');
  const area = document.getElementById('diagnosis-area');
  btn.classList.add('loading');
  btn.innerHTML = 'Procesando...';
  
  area.innerHTML = `
    <div class="card"><div class="card-body">
      <div class="loader-wrap">
        <div class="loader"></div>
        <div class="loader-text">Aplicando reglas de Customer Health...</div>
      </div>
    </div></div>`;

  // Simulamos el tiempo de respuesta de una IA (1.5 segundos)
  setTimeout(() => {
    btn.classList.remove('loading');
    btn.innerHTML = 'Análisis Completo ✓';
    renderDiagnosis(DIAGNOSTICOS[currentIndex]);
  }, 1500);
}

function renderDiagnosis(d) {
  const area = document.getElementById('diagnosis-area');
  
  let evidencias = d.evidencia.map(e => `
    <div class="evidencia-item">
      <span class="badge">${e.peso.toUpperCase()}</span> <strong>${e.metrica}:</strong> ${e.observacion}
    </div>
  `).join('');

  let acciones = d.acciones.map(a => `
    <div class="accion-item">
      <span class="badge">Prioridad ${a.prioridad}</span> <strong>${a.responsable}:</strong> ${a.accion} <br>
      <small style="color: var(--muted)">Playbook sugerido: ${a.playbook}</small>
    </div>
  `).join('');

  area.innerHTML = `
    <div class="card">
      <div class="card-header"><div class="card-title">Resultado de la IA</div></div>
      <div class="semaforo">
        <div class="semaforo-info">
          <div class="semaforo-level level-${d.nivel_riesgo}">Riesgo ${d.nivel_riesgo}</div>
          <div>Score de riesgo: ${d.score}/100</div>
        </div>
        <div class="semaforo-resumen">
          ${d.advertencia_confianza ? `<div class="advertencia">⚠️ ${d.advertencia_confianza}</div>` : ''}
          ${d.resumen}
        </div>
      </div>
    </div>

    <div class="card" style="margin-top: 15px;">
      <div class="card-header"><div class="card-title">Evidencia y Razonamiento</div></div>
      <div class="card-body">${evidencias}</div>
    </div>

    <div class="card" style="margin-top: 15px;">
      <div class="card-header"><div class="card-title">Playbooks y Plan de Acción</div></div>
      <div class="card-body">${acciones}</div>
    </div>
  `;
}

buildSidebar();
</script>
</body>
</html>
